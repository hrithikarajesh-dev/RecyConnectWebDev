<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - RecyConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <div class="logo">♻️</div>
        <h1>RecyConnect</h1>
      </div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="login.html" class="active">Login</a>
        <a href="register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="wrap section">
    <div style="max-width: 400px; margin: 50px auto; padding: 30px; background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
      <h2 style="text-align: center; color: #fff; margin-bottom: 20px;">Welcome Back!</h2>
      
      <form id="loginForm">
        <div style="margin-bottom: 15px;">
          <label style="color: #ccc; display: block; margin-bottom: 5px;">Email Address</label>
          <input type="email" id="email" required style="width: 100%; padding: 10px; border-radius: 5px; border: none;">
        </div>
        
        <div style="margin-bottom: 15px;">
          <label style="color: #ccc; display: block; margin-bottom: 5px;">Password</label>
          <input type="password" id="password" required style="width: 100%; padding: 10px; border-radius: 5px; border: none;">
        </div>

        <div style="text-align: right; margin-bottom: 20px;">
          <a href="forgot-password.html" style="color: #9ca81a; font-size: 0.9rem; text-decoration: none;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>

      <p id="errorMsg" style="color: #ff6b6b; text-align: center; margin-top: 15px; display: none;"></p>

      <div style="text-align: center; margin-top: 20px; color: #aaa; font-size: 0.9rem;">
        Don't have an account? <a href="register.html" style="color: #fff;">Register here</a>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('userEmail', data.user.email);
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = data.error;
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = "Server error. Please try again.";
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
