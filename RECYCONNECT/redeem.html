<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redeem Rewards - RecyConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@500;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <div class="logo">♻️</div>
        <h1>RecyConnect</h1>
      </div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
        <a href="waste-form.html">Submit Waste</a>
        <a href="redeem.html" class="active">Redeem</a>
      </nav>
      <button class="hamburger" onclick="document.body.classList.toggle('nav-open')">☰</button>
    </div>
  </header>

  <main class="wrap section">
    <div class="section-header">
      <h2 style="font-family:'Poppins', sans-serif; font-weight:800; font-size:36px;">Rewards Store</h2>
      <p style="opacity:0.9; font-size:1.1rem;">Your Balance: <strong style="color:#ffeb99; font-size:1.3rem;">570 Points</strong></p>
    </div>
    
    <div class="cards-grid">
      <div class="card" style="text-align:center; border:1px solid rgba(255,255,255,0.2);">
        <div style="font-size:45px; margin-bottom:15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));">🎟️</div>
        <h4>$10 Grocery Voucher</h4>
        <p>Redeem for valid local grocery stores.</p>
        <br>
        <button class="btn btn-primary" style="width:100%; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">Redeem (1000 Pts)</button>
      </div>

      <div class="card" style="text-align:center; border:1px solid rgba(255,255,255,0.2);">
        <div style="font-size:45px; margin-bottom:15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));">🌱</div>
        <h4>Plant a Tree</h4>
        <p>We will plant a tree in your name.</p>
        <br>
        <button class="btn btn-primary" style="width:100%; box-shadow: 0 4px 15px rgba(0,0,0,0.2);" onclick="alert('Thank you! Tree donation made.')">Donate (500 Pts)</button>
      </div>

      <div class="card" style="text-align:center; border:1px solid rgba(255,255,255,0.2);">
        <div style="font-size:45px; margin-bottom:15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));">☕</div>
        <h4>Coffee Discount</h4>
        <p>20% off at partner cafes.</p>
        <br>
        <button class="btn btn-primary" style="width:100%; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">Redeem (200 Pts)</button>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-grid">
      <p class="muted small">© 2025 RecyConnect</p>
      <nav class="footer-nav"><a href="dashboard.html">Dashboard</a><a href="about.html">About</a></nav>
    </div>
  </footer>
</body>
</html>
