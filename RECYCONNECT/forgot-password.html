<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password - RecyConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <div class="logo">♻️</div>
        <h1>RecyConnect</h1>
      </div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="wrap section">
    <div style="max-width: 400px; margin: 50px auto; padding: 30px; background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
      <h2 style="text-align: center; color: #fff; margin-bottom: 20px;">Reset Password</h2>
      <p style="text-align: center; color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">Enter your email to set a new password.</p>
      
      <form id="resetForm">
        <div style="margin-bottom: 15px;">
          <label style="color: #ccc; display: block; margin-bottom: 5px;">Email Address</label>
          <input type="email" id="email" required placeholder="Enter your registered email" style="width: 100%; padding: 10px; border-radius: 5px; border: none;">
        </div>
        
        <div style="margin-bottom: 15px;">
          <label style="color: #ccc; display: block; margin-bottom: 5px;">New Password</label>
          <input type="password" id="newPassword" required placeholder="Enter new password" style="width: 100%; padding: 10px; border-radius: 5px; border: none;">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Update Password</button>
      </form>

      <p id="message" style="text-align: center; margin-top: 15px; display: none;"></p>

      <div style="text-align: center; margin-top: 20px;">
        <a href="login.html" style="color: #fff; font-size: 0.9rem;">Back to Login</a>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const newPassword = document.getElementById('newPassword').value;
      const message = document.getElementById('message');

      message.style.display = 'block';
      message.textContent = "Updating...";
      message.style.color = '#aaa';

      try {
        const response = await fetch('/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, newPassword })
        });

        const data = await response.json();

        if (response.ok) {
          message.style.color = '#9ca81a'; // Green
          message.textContent = "Success! Password changed. Redirecting...";
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          message.style.color = '#ff6b6b'; // Red
          message.textContent = data.error;
        }
      } catch (err) {
        message.textContent = "Server error. Try again.";
      }
    });
  </script>
</body>
</html>
