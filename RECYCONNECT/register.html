<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register - RecyConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@500;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <div class="logo">♻️</div>
        <h1>RecyConnect</h1>
      </div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="register.html" class="active">Register</a>
        <a href="waste-form.html">Submit Waste</a>
        <a href="redeem.html">Redeem</a>
      </nav>
      <button class="hamburger" onclick="document.body.classList.toggle('nav-open')">☰</button>
    </div>
  </header>

  <main class="wrap section">
    <div class="form-box">
      <h2>Create Account</h2>
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" class="form-control" placeholder="e.g. Alex Doe" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign Up</button>
        <p id="message" style="text-align:center; margin-top:15px; font-size:0.9rem; opacity:0.8;"></p>
        <p style="text-align:center; margin-top:15px; font-size:0.9rem; opacity:0.8">
          Already have an account? <a href="waste-form.html" style="color:#fff; text-decoration:underline">Continue</a>
        </p>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-grid">
      <p class="muted small">© 2025 RecyConnect</p>
      <nav class="footer-nav"><a href="dashboard.html">Dashboard</a><a href="about.html">About</a></nav>
    </div>
  </footer>

  <script>
    const registerForm = document.getElementById('registerForm');
    const messageDiv = document.getElementById('message');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();
        if (response.ok) {
          messageDiv.textContent = 'Registration successful! Redirecting...';
          messageDiv.style.color = '#9ca81a';
          localStorage.setItem('userEmail', email);
          setTimeout(() => window.location.href = 'dashboard.html', 1500);
        } else {
          messageDiv.textContent = 'Error: ' + (data.error || 'Registration failed');
          messageDiv.style.color = '#ff6b6b';
        }
      } catch (error) {
        messageDiv.textContent = 'Connection error: ' + error.message;
        messageDiv.style.color = '#ff6b6b';
      }
    });
  </script>
</body>
</html>
